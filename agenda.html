<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — Macedo & Reis</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script type="module" src="assets/js/auth-guard.js"></script>
  <style>
    .ag-toolbar { display:flex; flex-direction:column; gap:10px; margin-bottom:18px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:12px; padding:10px 12px; }
    .ag-tb-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .ag-tb-topo { justify-content:space-between; }
    #agBusca { flex:1; min-width:220px; font-size:13px; }
    .ag-tb-group { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .ag-views { display:flex; gap:4px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:10px; padding:3px; }
    .ag-view-btn { padding:7px 16px; font-size:13px; font-weight:600; color:#8A93A6; background:none; border:none; border-radius:8px; cursor:pointer; font-family:inherit; }
    .ag-view-btn:hover { color:#C5D8E8; }
    .ag-view-btn.is-active { background:rgba(91,130,166,.25); color:#E6EBF2; }
    .ag-nav { display:flex; align-items:center; gap:8px; }
    .ag-nav button { width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:8px; color:#C5D8E8; cursor:pointer; font-size:16px; }
    .ag-nav button:hover { background:rgba(255,255,255,.08); }
    .ag-hoje-btn { width:auto !important; padding:0 12px; font-size:13px; font-weight:600; }
    .ag-periodo { font-size:15px; font-weight:600; color:#E6EBF2; text-transform:capitalize; white-space:nowrap; }
    .ag-toolbar .select { max-width:160px; padding:7px 10px; font-size:13px; }

    .setor-chip { display:inline-block; padding:2px 8px; border-radius:999px; font-size:10.5px; font-weight:600; border:1px solid; white-space:nowrap; }
    .setor-dot { display:inline-block; width:8px; height:8px; border-radius:50%; flex:0 0 auto; }

    /* ---------- DIA: layout em duas colunas ---------- */
    .ag-dia-layout { display:grid; grid-template-columns:minmax(0,1.7fr) minmax(260px,1fr); gap:16px; align-items:start; }
    .ag-dia-col { min-width:0; }
    .ag-resumo-wrap { position:sticky; top:16px; min-width:0; }
    .ag-resumo { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:16px; }
    .ag-resumo-titulo { font-size:14px; font-weight:600; color:#E6EBF2; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .ag-resumo-titulo svg { color:#8FC0F0; }
    .ag-resumo-slide { min-height:150px; }
    .rs-label { font-size:11px; font-weight:600; letter-spacing:.05em; color:#8AAEC8; text-transform:uppercase; margin-bottom:12px; }
    .rs-big { display:flex; align-items:baseline; gap:6px; margin-bottom:8px; }
    .rs-big .n { font-size:30px; font-weight:700; color:#E6EBF2; line-height:1; }
    .rs-big .sub { font-size:14px; color:#8A93A6; }
    .rs-bar { height:7px; background:rgba(255,255,255,.06); border-radius:999px; overflow:hidden; margin-bottom:10px; }
    .rs-bar > div { height:100%; background:#3FB07A; border-radius:999px; transition:width .4s; }
    .rs-foot { font-size:12px; color:#8A93A6; }
    .rs-rows { display:flex; flex-direction:column; gap:9px; }
    .rs-row { display:flex; align-items:center; justify-content:space-between; font-size:13px; color:#D7DEE8; }
    .rs-row .lab { display:flex; align-items:center; gap:8px; }
    .rs-row .val { font-weight:700; color:#E6EBF2; }
    .rs-prox { display:flex; flex-direction:column; gap:10px; }
    .rs-prox-item { display:flex; gap:9px; align-items:flex-start; font-size:12.5px; }
    .rs-prox-data { color:#8FC0F0; font-weight:600; white-space:nowrap; min-width:42px; }
    .rs-prox-txt { color:#D7DEE8; min-width:0; }
    .rs-prox-txt .cli { color:#8A93A6; font-size:11.5px; }
    .rs-empty { font-size:12.5px; color:#8A93A6; padding:8px 0; }
    .ag-resumo-dots { display:flex; gap:6px; justify-content:center; margin-top:16px; }
    .ag-resumo-dots button { width:7px; height:7px; padding:0; border-radius:50%; border:none; background:rgba(255,255,255,.18); cursor:pointer; transition:background .2s,width .2s; }
    .ag-resumo-dots button.on { background:#8FC0F0; width:18px; border-radius:999px; }

    @media (max-width:860px){
      .ag-dia-layout { grid-template-columns:1fr; }
      .ag-resumo { position:static; order:-1; }
    }

    /* ---------- DIA ---------- */
    .ag-dia-secao { font-size:13px; font-weight:600; color:#8AAEC8; margin:16px 0 9px; display:flex; align-items:center; gap:8px; }
    .ag-dia-secao:first-child { margin-top:2px; }
    .ag-dia-secao .cont { background:rgba(255,255,255,.06); color:#C5D8E8; border-radius:999px; padding:1px 9px; font-size:12px; }
    .ag-card { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-left:3px solid #8A93A6; border-radius:10px; padding:10px 13px; margin-bottom:7px; }
    .ag-card.prio-alta  { border-left-color:#E06C6C; }
    .ag-card.prio-media { border-left-color:#E3B341; }
    .ag-card.prio-baixa { border-left-color:#5B82A6; }
    .ag-card-main { flex:1 1 auto; min-width:0; }
    .ag-card-titulo { font-size:14px; color:#E6EBF2; font-weight:500; margin-bottom:4px; }
    .ag-card-meta { font-size:12px; color:#8A93A6; display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
    .ag-card-meta .sep { opacity:.5; }
    .ag-prio { padding:5px 8px; font-size:12px; border-radius:8px; background:#141A22; color:#C5D8E8; border:1px solid rgba(255,255,255,.12); cursor:pointer; }
    .ag-card.feita { opacity:.55; }
    .ag-card.feita .ag-card-titulo { text-decoration:line-through; }
    .ag-rotina { border-left-style:dashed; }
    #resumoPainel { display:flex; flex-direction:column; gap:10px; }
    .rp-topo { display:flex; gap:14px; align-items:center; }
    .rp-big { font-size:26px; font-weight:700; color:#E6EBF2; }
    .rp-big span { font-size:13px; font-weight:400; color:#8A93A6; }
    .rp-sub { font-size:12px; color:#8A93A6; margin-top:2px; }
    .rp-prios { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .rp-prio { font-size:10.5px; font-weight:600; padding:2px 8px; border:1px solid; border-radius:999px; }
    .rp-festa { text-align:center; padding:8px; border-radius:10px; background:rgba(63,176,122,.12); color:#3FB07A; font-size:13px; font-weight:600; }
    .rp-secao { font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:#8A93A6; margin-top:4px; padding-top:8px; border-top:1px solid rgba(255,255,255,.07); }
    .rp-setores { display:flex; gap:8px; flex-wrap:wrap; }
    .rp-setor { display:inline-flex; gap:5px; align-items:center; font-size:12px; color:#B9C2D0; }
    .rp-prazos { display:flex; flex-direction:column; gap:6px; }
    .rp-prazo { display:flex; gap:9px; align-items:center; cursor:pointer; padding:5px 7px; border-radius:8px; }
    .rp-prazo:hover { background:rgba(255,255,255,.05); }
    .rp-selo { flex:none; font-size:10px; font-weight:700; padding:2.5px 8px; border-radius:6px; border:1px solid; letter-spacing:.03em; }
    .rp-ptit { font-size:12.5px; color:#D6DCE6; line-height:1.3; }
    .rp-ptit small { display:block; color:#6E7787; font-size:10.5px; }
    .ag-rot-check { width:24px; height:24px; flex:0 0 auto; border-radius:50%; border:2px solid rgba(255,255,255,.22); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff; padding:0; transition:background .15s, border-color .15s; }
    .ag-rot-check:hover { border-color:#3FB07A; }
    .ag-rot-check.on { background:#3FB07A; border-color:#3FB07A; }
    .ag-rot-check svg { width:14px; height:14px; }
    .ag-vazio { padding:36px; text-align:center; color:#8A93A6; font-size:14px; background:rgba(255,255,255,.02); border:1px dashed rgba(255,255,255,.1); border-radius:12px; }

    /* ---------- SEMANA ---------- */
    .ag-semana { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
    .ag-wk-col { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.07); border-radius:10px; min-height:120px; padding:8px; }
    .ag-wk-col.hoje { border-color:rgba(91,130,166,.5); background:rgba(91,130,166,.08); }
    .ag-wk-head { font-size:11px; color:#8A93A6; text-align:center; margin-bottom:8px; font-weight:600; }
    .ag-wk-head .dnum { display:block; font-size:18px; color:#E6EBF2; }
    .ag-wk-item { display:flex; align-items:center; gap:5px; font-size:11.5px; color:#D7DEE8; padding:4px 6px; border-radius:6px; background:rgba(255,255,255,.04); margin-bottom:4px; border-left:2px solid #8A93A6; }
    .ag-wk-item.prio-alta { border-left-color:#E06C6C; } .ag-wk-item.prio-media { border-left-color:#E3B341; } .ag-wk-item.prio-baixa { border-left-color:#5B82A6; }
    .ag-wk-item.feita { opacity:.5; text-decoration:line-through; }
    .ag-wk-item .t { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ---------- MÊS ---------- */
    .ag-mes { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
    .ag-mes-dow { text-align:center; font-size:11px; color:#8A93A6; font-weight:600; text-transform:uppercase; letter-spacing:.04em; padding-bottom:4px; }
    .ag-mo-cell { background:rgba(255,255,255,.02); border:1px solid rgba(255,255,255,.07); border-radius:8px; min-height:92px; padding:6px; cursor:pointer; transition:background .12s; }
    .ag-mo-cell:hover { background:rgba(255,255,255,.05); }
    .ag-mo-cell.fora { opacity:.4; }
    .ag-mo-cell.hoje { border-color:rgba(91,130,166,.6); }
    .ag-mo-day { font-size:13px; color:#C5D8E8; font-weight:600; margin-bottom:4px; }
    .ag-mo-cell.hoje .ag-mo-day { color:#fff; }
    .ag-mo-chip { display:flex; align-items:center; gap:4px; font-size:10.5px; color:#D7DEE8; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ag-mo-chip.feita { opacity:.5; text-decoration:line-through; }
    .ag-mo-mais { font-size:10px; color:#8A93A6; margin-top:2px; }

    @media (max-width:820px){
      .ag-semana, .ag-mes { grid-template-columns:repeat(7,1fr); font-size:10px; }
      .ag-wk-item .t, .ag-mo-chip { font-size:10px; }
    }
    @media (max-width:560px){
      .ag-semana { grid-template-columns:1fr; }
      .ag-periodo { min-width:auto; font-size:15px; }
    }

    /* modal de detalhe da tarefa (igual ao setor) */
    .ag-card[data-taskid] { cursor:pointer; }
    .add-res { border:1px solid rgba(255,255,255,.1); border-radius:10px; overflow:hidden; margin:-6px 0 12px; }
    .add-res button { display:block; width:100%; text-align:left; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,.06); color:#E6EBF2; font:inherit; font-size:13px; padding:9px 12px; cursor:pointer; }
    .add-res button:hover { background:rgba(138,174,200,.1); }
    .add-res small { color:#6E7787; display:block; font-size:11px; }
    .fa-modal-overlay { position:fixed; inset:0; background:rgba(8,12,18,.72); display:none; align-items:center; justify-content:center; padding:20px; z-index:100; overflow-y:auto; }
    .fa-modal-overlay.is-open { display:flex; }
    .fa-modal { width:100%; max-width:560px; background:#141A22; border:1px solid rgba(255,255,255,.10); border-radius:16px; overflow:hidden; margin:auto; }
    .fa-modal-head { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid rgba(255,255,255,.08); }
    .fa-modal-head h3 { margin:0; color:#E6EBF2; font-size:18px; }
    .fa-modal-close { background:none; border:none; color:#8A93A6; font-size:26px; line-height:1; cursor:pointer; padding:0 4px; }
    .fa-modal-close:hover { color:#E6EBF2; }
    .fa-modal-body { padding:22px; display:flex; flex-direction:column; gap:14px; max-height:70vh; overflow-y:auto; }
    .fa-field { display:flex; flex-direction:column; gap:6px; }
    .fa-field > span { font-size:13px; color:#8AAEC8; }
    .fa-field-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .fa-modal-foot { display:flex; justify-content:flex-end; gap:10px; padding:16px 22px; border-top:1px solid rgba(255,255,255,.08); }
    .fa-modal textarea.input, .fa-modal .input, .fa-modal .select { resize:vertical; font-family:inherit; }
    .det-empresa { display:flex; flex-direction:column; gap:2px; }
    .det-empresa span { font-size:13px; color:#8AAEC8; }
    .det-empresa strong { color:#E6EBF2; font-size:15px; }
    .alv-conc-banner { background:rgba(63,176,122,.12); border:1px solid rgba(63,176,122,.35); color:#3FB07A; border-radius:10px; padding:8px 12px; font-size:13px; }
    .alv-hr { border:none; border-top:1px solid rgba(255,255,255,.08); margin:8px 0 2px; }
    .alv-tl-head { font-weight:600; color:#E6EBF2; font-size:15px; }
    .tl { display:flex; flex-direction:column; gap:0; margin-top:8px; }
    .tl-item { position:relative; padding:0 0 16px 22px; border-left:2px solid rgba(255,255,255,.10); }
    .tl-item:last-child { border-left-color:transparent; padding-bottom:2px; }
    .tl-item::before { content:''; position:absolute; left:-6px; top:3px; width:10px; height:10px; border-radius:50%; background:#5B82A6; border:2px solid #141A22; }
    .tl-when { font-size:12px; color:#8A93A6; }
    .tl-desc { color:#E6EBF2; font-size:14px; margin-top:2px; white-space:pre-wrap; }
    .tl-autor { font-size:12px; color:#8AAEC8; margin-top:2px; }
    .tl-empty { color:#8A93A6; font-size:13px; }
    .ag-semprazo { margin-bottom: 16px; }
    .ag-semprazo .ag-dia-secao { color:#E3B341; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <div class="topbar-logo"><img src="assets/logo-mr.png" alt="Macedo & Reis" width="32" height="32" style="display:block;object-fit:contain;"></div>
        <div class="topbar-name">Macedo <span>&</span> Reis</div>
      </div>
      <div class="topbar-actions">
        <div class="user-chip">
          <div class="user-avatar" id="userAvatar">—</div>
          <span id="userName">Carregando…</span>
        </div>
        <button class="btn btn-ghost btn-sm" id="btnLogout">Sair</button>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <div class="breadcrumb">
          <a href="index.html">Painel central</a>
          <span class="breadcrumb-sep">/</span>
          <span>Agenda</span>
        </div>
        <div class="eyebrow">Organização</div>
        <h1>Agenda</h1>
        <p>Suas tarefas e rotinas organizadas por dia. Na visão Dia, ordene pela prioridade de cada uma.</p>
      </div>

      <div class="ag-toolbar">
        <div class="ag-tb-row ag-tb-topo">
          <div class="ag-tb-group">
          <div class="ag-nav">
            <button id="agHoje" class="ag-hoje-btn">Hoje</button>
            <button id="agPrev" title="Anterior">‹</button>
            <button id="agNext" title="Próximo">›</button>
          </div>
          <span class="ag-periodo" id="agPeriodo">—</span>
          </div>
          <div class="ag-views">
            <button class="ag-view-btn is-active" data-view="dia">Dia</button>
            <button class="ag-view-btn" data-view="semana">Semana</button>
            <button class="ag-view-btn" data-view="mes">Mês</button>
          </div>
        </div>
        <div class="ag-tb-row">
          <input type="text" id="agBusca" class="input" placeholder="🔎 Buscar tarefa ou cliente em qualquer data…">
          <select id="fSetor" class="select"><option value="">Todos os setores</option></select>
          <select id="fResp" class="select"><option value="">Todos os responsáveis</option></select>
          <button class="btn btn-primary btn-sm" id="btnNovaAv">+ Tarefa</button>
        </div>
      </div>

      <div class="ag-semprazo" id="agSemPrazo"></div>

      <div id="agConteudo">
        <div class="ag-vazio"><span class="spinner"></span> Carregando…</div>
      </div>
    </main>
  </div>

  <div class="fa-modal-overlay" id="avOverlay">
    <div class="fa-modal" style="width:min(520px,94vw);">
      <div class="fa-modal-head"><h3>Tarefa rápida</h3><button class="fa-modal-close" id="avClose">&times;</button></div>
      <div class="fa-modal-body">
        <label class="fa-field"><span>O que precisa ser feito? *</span><input type="text" id="avTitulo" class="input" placeholder="Ex.: Juntar CNDs e declarações do cliente"></label>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
          <label class="fa-field"><span>Setor</span><select id="avSetor" class="select">
            <option value="geral" selected>Geral</option><option value="fiscal">Fiscal</option><option value="dp">Depto. Pessoal</option>
            <option value="contabil">Contábil</option><option value="societario">Societário</option><option value="financeiro">Financeiro</option>
            <option value="comercial">Comercial</option><option value="irpf">IRPF</option><option value="clientes">Clientes</option>
          </select></label>
          <label class="fa-field"><span>Responsável</span><select id="avResp" class="select"><option value="">— ninguém ainda —</option></select></label>
          <label class="fa-field"><span>Prazo</span><input type="date" id="avPrazo" class="input"></label>
          <label class="fa-field"><span>Prioridade</span><select id="avPri" class="select"><option value="media">Média</option><option value="alta">Alta</option><option value="baixa">Baixa</option></select></label>
        </div>
        <label class="fa-field"><span>Cliente (opcional)</span><input type="text" id="avCliBusca" class="input" placeholder="Buscar por razão ou fantasia…" autocomplete="off"></label>
        <div id="avCliRes" class="add-res" style="display:none;"></div>
        <div id="avCliChip" style="display:none; margin:-6px 0 12px;"><span class="chip">🏢 <span id="avCliNome"></span> <a href="#" id="avCliTira" style="color:inherit; text-decoration:none; margin-left:6px;">✕</a></span></div>
        <label class="fa-field"><span>Descrição (opcional)</span><textarea id="avDesc" class="input" rows="3" style="resize:vertical;"></textarea></label>
      </div>
      <div class="fa-modal-foot">
        <button class="btn btn-ghost" id="avCancelar">Cancelar</button>
        <button class="btn btn-primary" id="avSalvar">Criar tarefa</button>
      </div>
    </div>
  </div>

  <div class="fa-modal-overlay" id="detOverlay">
    <div class="fa-modal" style="max-width:560px;">
      <div class="fa-modal-head"><h3 id="dTipo">Tarefa</h3><button class="fa-modal-close" id="detClose">&times;</button></div>
      <div class="fa-modal-body">
        <div class="alv-conc-banner" id="dConcBanner" style="display:none;"></div>
        <div class="det-empresa"><span>Empresa</span><strong id="dEmpresa"></strong></div>
        <div class="fa-field-row">
          <label class="fa-field"><span>Responsável</span><input type="text" id="dResp" class="input"></label>
          <label class="fa-field"><span>Prazo</span><input type="date" id="dPrazo" class="input"></label>
        </div>
        <div class="fa-field-row">
          <label class="fa-field"><span>Prioridade</span><select id="dPrioridade" class="select"><option value="media">Média</option><option value="alta">Alta</option><option value="baixa">Baixa</option></select></label>
          <label class="fa-field" id="dStatusWrap"><span>Status</span><select id="dStatus" class="select"><option value="pendente">Pendente</option><option value="em_andamento">Em andamento</option></select></label>
        </div>
        <label class="fa-field"><span>Descrição</span><textarea id="dDescricao" class="input" rows="2"></textarea></label>
        <div><button class="btn btn-primary btn-sm" id="dSalvar">Salvar alterações</button></div>
        <hr class="alv-hr">
        <div class="alv-tl-head">Linha do tempo</div>
        <label class="fa-field"><span>Registrar andamento</span><textarea id="dNovoAnd" class="input" rows="2" placeholder="Ex.: Protocolado, retornou, etc…"></textarea></label>
        <div><button class="btn btn-primary btn-sm" id="dAddAnd">Adicionar andamento</button></div>
        <div class="tl" id="dTimeline"></div>
      </div>
      <div class="fa-modal-foot">
        <button class="btn btn-danger" id="dExcluir" style="margin-right:auto;">Excluir</button>
        <button class="btn btn-ghost" id="dBtnReabrir" style="display:none;">Reabrir</button>
        <button class="btn btn-primary" id="dBtnConcluir">Concluir</button>
      </div>
    </div>
  </div>

  <script src="assets/js/tour.js"></script>
  <script type="module">
    import { supabase, getCurrentUser, signOut } from './assets/js/supabase.js';

    // ---- identidade visual por setor ----
    const SETOR_INFO = {
      clientes:             ['Clientes', '#7FD4D2', 'rgba(91,192,190,.15)'],
      dp:                   ['DP', '#A48FE0', 'rgba(150,123,220,.15)'],
      departamento_pessoal: ['DP', '#A48FE0', 'rgba(150,123,220,.15)'],
      fiscal:               ['Fiscal', '#8AAEC8', 'rgba(91,130,166,.18)'],
      contabil:             ['Contábil', '#8597E0', 'rgba(133,151,224,.15)'],
      societario:           ['Societário', '#E3B341', 'rgba(227,179,65,.15)'],
      financeiro:           ['Financeiro', '#5FC698', 'rgba(63,176,122,.15)'],
      comercial:            ['Comercial', '#E0A05F', 'rgba(224,160,95,.15)'],
      irpf:                 ['IRPF', '#E08FA8', 'rgba(224,143,168,.15)'],
      gestao:               ['Gestão', '#9AA8BE', 'rgba(154,168,190,.15)'],
    };
    const SETORES_LISTA = ['clientes','dp','fiscal','contabil','societario','financeiro','comercial','irpf','gestao','geral'];
    const EQUIPE = ['Thalia','Vitória','Adaini','Samuel','Diego','Edna'];
    const FILTRO_PESSOAL = {
      'fiscal@macedoereis.com.br':'Thalia', 'rh@macedoereis.com.br':'Vitória',
      'contabil@macedoereis.com.br':'Adaini', 'financeiro@macedoereis.com.br':'Samuel',
      'diego@macedoereis.com.br':'Diego',
    };
    const SOCIOS = ['financeiro@macedoereis.com.br','diego@macedoereis.com.br'];

    const PRIO_ORDEM = { alta:0, media:1, média:1, baixa:2 };
    const PRIO_LABEL = { alta:'Alta', media:'Média', baixa:'Baixa' };

    // ---- estado ----
    const estado = { view:'dia', cursor:hojeMeiaNoite(), setor:'', resp:'' };
    let usuarioEmail = null;
    let procAtual = null;

    // ---- helpers de data ----
    function hojeMeiaNoite(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
    function ymd(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
    function diaSemanaISO(d){ const x=d.getDay(); return x===0?7:x; }
    function diasNoMes(ano, mes0){ return new Date(ano, mes0+1, 0).getDate(); }
    function segundaDaSemana(d){ const x=new Date(d.getFullYear(),d.getMonth(),d.getDate()); x.setDate(x.getDate()-(diaSemanaISO(x)-1)); return x; }
    function addDias(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
    function mesmaData(a,b){ return ymd(a)===ymd(b); }
    const HOJE_STR = ymd(hojeMeiaNoite());
    const DOW = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
    const fmtDiaLongo = (d)=> d.toLocaleDateString('pt-BR',{weekday:'long', day:'numeric', month:'long'});
    const fmtMesAno = (d)=> d.toLocaleDateString('pt-BR',{month:'long', year:'numeric'});

    // ---- rótulo de rotina (campo varia) ----
    function rotuloRotina(r){ return r.titulo || r.descricao || r.nome || r.tarefa || r.atividade || 'Rotina'; }
    function caiNoDia(r, d){
      const p = r.periodicidade || 'diaria';
      if (p==='diaria') return true;
      if (p==='semanal') return diaSemanaISO(d) === (r.dia_semana||1);
      if (p==='mensal') return d.getDate() === Math.min(r.dia_mes||1, diasNoMes(d.getFullYear(), d.getMonth()));
      if (p==='anual'){ const a=String(r.dia_anual||'01-01').split('-').map(Number); const mm=(a[0]||1)-1, dd=a[1]||1; return d.getMonth()===mm && d.getDate()===Math.min(dd, diasNoMes(d.getFullYear(),mm)); }
      return false;
    }
    // rotina "feita" para o dia exibido — espelha feitaNoPeriodo do painel
    function rotinaFeita(r, d){
      if (!r.ultima_execucao) return false;
      const u = new Date(String(r.ultima_execucao).slice(0,10) + 'T00:00:00');
      const p = r.periodicidade || 'diaria';
      if (p==='diaria')  return String(r.ultima_execucao).slice(0,10) === ymd(d);
      if (p==='semanal') return segundaDaSemana(u).getTime() === segundaDaSemana(d).getTime();
      if (p==='mensal')  return u.getFullYear()===d.getFullYear() && u.getMonth()===d.getMonth();
      if (p==='anual')   return u.getFullYear()===d.getFullYear();
      return String(r.ultima_execucao).slice(0,10) === ymd(d);
    }

    // ---- filtros (responsável) ----
    const norm = (s)=> String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
    function passaFiltro(item){
      if (estado.setor && item.setor !== estado.setor) return false;
      if (estado.resp){ if (norm(item.responsavel) !== norm(estado.resp)) return false; }
      return true;
    }

    // ---- dados (cache simples por range) ----
    let cacheTarefas = [];
    let cacheRotinas = [];
    let cacheProximos = [];
    let cacheSemPrazo = [];
    let resumoTimer = null;
    async function carregarDados(ini, fim){
      const iniS = ymd(ini), fimS = ymd(fim);
      const { data: ts } = await supabase.from('tarefas')
        .select('id, titulo, setor, responsavel, prazo, status, prioridade, cliente_id, clientes(nome_principal), concluida_em, concluida_por')
        .gte('prazo', iniS).lte('prazo', fimS);
      cacheTarefas = ts || [];
      const { data: rs } = await supabase.from('rotinas').select('*').eq('ativo', true);
      cacheRotinas = rs || [];
      const { data: sp } = await supabase.from('tarefas')
        .select('id, titulo, setor, responsavel, prazo, status, prioridade, cliente_id, clientes(nome_principal), concluida_em, concluida_por')
        .is('prazo', null).neq('status', 'concluida');
      cacheSemPrazo = sp || [];
    }
    // próximos prazos (após hoje), para o slide do resumo — independe do dia exibido
    async function carregarProximos(){
      const { data } = await supabase.from('tarefas')
        .select('id, titulo, setor, responsavel, prazo, status, clientes(nome_principal)')
        .gt('prazo', HOJE_STR).neq('status','concluida')
        .order('prazo', { ascending:true }).limit(20);
      cacheProximos = data || [];
    }

    function tarefasDoDia(d){
      const s = ymd(d);
      return cacheTarefas.filter(t => t.prazo === s && passaFiltro(t));
    }
    function rotinasDoDia(d){
      if (d.getDay() === 0 || d.getDay() === 6) return []; // escritório é seg–sex: fim de semana zero rotinas
      return cacheRotinas.filter(r => caiNoDia(r, d) && passaFiltro(r));
    }

    // ---- busca global (todas as datas, todos os responsáveis) ----
    let modoBusca = false, cacheBusca = [], termoBusca = '', buscaTimer = null;

    async function executarBusca(termo){
      const t = termo.replace(/[,()]/g, ' ').trim();
      const [porTexto, cli] = await Promise.all([
        supabase.from('tarefas').select('*, clientes(nome_principal, nome_fantasia)')
          .or(`titulo.ilike.*${t}*,descricao.ilike.*${t}*,responsavel.ilike.*${t}*`).limit(50),
        supabase.from('clientes').select('id')
          .or(`nome_principal.ilike.*${t}*,nome_fantasia.ilike.*${t}*`).limit(20)
      ]);
      let porCliente = { data: [] };
      const ids = (cli.data || []).map(c => c.id);
      if (ids.length) {
        porCliente = await supabase.from('tarefas')
          .select('*, clientes(nome_principal, nome_fantasia)')
          .in('cliente_id', ids).limit(50);
      }
      const mapa = new Map();
      [...(porTexto.data || []), ...(porCliente.data || [])].forEach(x => mapa.set(x.id, x));
      cacheBusca = [...mapa.values()].sort((a, b) => {
        const ca = a.status === 'concluida' ? 1 : 0, cb = b.status === 'concluida' ? 1 : 0;
        if (ca !== cb) return ca - cb;
        return String(a.prazo || '0000') < String(b.prazo || '0000') ? -1 : 1;
      });
      termoBusca = termo; modoBusca = true;
      render();
    }

    function renderBusca(){
      const fData = p => p ? String(p).slice(0, 10).split('-').reverse().join('/') : 'Sem prazo';
      let html = `<div class="ag-dia-secao">🔎 Resultados para "${esc(termoBusca)}" <span class="cont">${cacheBusca.length}</span>
        <button class="btn btn-ghost btn-sm" id="agBuscaLimpar" style="margin-left:12px;">Limpar busca</button>
        <span style="font-weight:400; font-size:11.5px; color:#6E7787; margin-left:10px;">busca em todas as datas e responsáveis</span></div>`;
      if (!cacheBusca.length) html += '<div style="color:#8A93A6; padding:20px 4px;">Nada encontrado com esse termo.</div>';
      cacheBusca.forEach(t => {
        const concl = t.status === 'concluida';
        const cli = t.clientes?.nome_principal ? `<span>${esc(t.clientes.nome_principal)}</span><span class="sep">·</span>` : '';
        const resp = t.responsavel ? `<span>${esc(t.responsavel)}</span>` : '';
        html += `<div class="ag-card ${classePrio(t.prioridade)}" data-bstask="${t.id}"${concl ? ' style="opacity:.55;"' : ''}>
          <div class="ag-card-main">
            <div class="ag-card-titulo">${concl ? '✓ ' : ''}${esc(t.titulo) || '(sem título)'}</div>
            <div class="ag-card-meta"><b style="color:#8AAEC8;">${fData(t.prazo)}</b><span class="sep">·</span>${chip(t.setor)} ${cli} ${resp}</div>
          </div>
        </div>`;
      });
      return html;
    }

    function wireBusca(){
      document.getElementById('agBuscaLimpar')?.addEventListener('click', limparBusca);
      document.querySelectorAll('[data-bstask]').forEach(el =>
        el.addEventListener('click', () => abrirDetalhe(el.dataset.bstask)));
    }

    function limparBusca(){
      modoBusca = false; cacheBusca = []; termoBusca = '';
      document.getElementById('agBusca').value = '';
      render();
    }

    document.getElementById('agBusca').addEventListener('input', e => {
      const v = e.target.value.trim();
      clearTimeout(buscaTimer);
      if (v.length < 2) { if (modoBusca) limparBusca(); return; }
      buscaTimer = setTimeout(() => executarBusca(v), 300);
    });
    document.getElementById('agBusca').addEventListener('keydown', e => { if (e.key === 'Escape') limparBusca(); });

    // ---- render: roteador ----
    function renderSemPrazo(){
      const el = document.getElementById('agSemPrazo');
      if (!el) return;
      const itens = cacheSemPrazo.filter(passaFiltro)
        .sort((a, b) => (PRIO_ORDEM[norm(a.prioridade)] ?? 1) - (PRIO_ORDEM[norm(b.prioridade)] ?? 1));
      if (!itens.length) { el.innerHTML = ''; return; }
      let html = `<div class="ag-dia-secao">⚠ Sem prazo definido <span class="cont">${itens.length}</span></div>`;
      itens.forEach(t => {
        const cli = t.clientes?.nome_principal ? `<span>${esc(t.clientes.nome_principal)}</span><span class="sep">·</span>` : '';
        const resp = t.responsavel ? `<span>${esc(t.responsavel)}</span>` : '';
        html += `<div class="ag-card ${classePrio(t.prioridade)}" data-sptask="${t.id}">
          <div class="ag-card-main">
            <div class="ag-card-titulo">${esc(t.titulo) || '(sem título)'}</div>
            <div class="ag-card-meta">${chip(t.setor)} ${cli} ${resp}</div>
          </div>
        </div>`;
      });
      el.innerHTML = html;
      el.querySelectorAll('[data-sptask]').forEach(card =>
        card.addEventListener('click', () => abrirDetalhe(card.dataset.sptask)));
    }

    function render(){
      renderSemPrazo();
      atualizarPeriodo();
      const c = document.getElementById('agConteudo');
      if (modoBusca) { c.innerHTML = renderBusca(); wireBusca(); return; }
      if (estado.view==='dia') c.innerHTML = renderDia();
      else if (estado.view==='semana') c.innerHTML = renderSemana();
      else c.innerHTML = renderMes();
      ligarInteracoes();
      if (estado.view==='dia') montarResumo();
      else if (resumoTimer){ clearInterval(resumoTimer); resumoTimer = null; }
    }

    // ===================== RESUMO DO DIA (rotativo) =====================
    const fmtISO = dt => dt.toISOString().slice(0, 10);
    function montarResumo(){
      if (resumoTimer){ clearInterval(resumoTimer); resumoTimer = null; }
      const painel = document.getElementById('resumoPainel');
      if (!painel) return;

      const d = estado.cursor;
      const tarefas = tarefasDoDia(d);
      const pend = tarefas.filter(t => t.status !== 'concluida');
      const feitas = tarefas.length - pend.length;
      const rotinasR = rotinasDoDia(d);
      const rotFeitas = rotinasR.filter(r => rotinaFeita(r, d)).length;
      const totalTudo = tarefas.length + rotinasR.length;
      const feitasTudo = feitas + rotFeitas;
      const pct = totalTudo ? Math.round(feitasTudo / totalTudo * 100) : 0;

      // anel de progresso
      const R = 34, C = 2 * Math.PI * R;
      const corAnel = pct >= 100 ? '#3FB07A' : pct >= 50 ? '#8AAEC8' : '#5B82A6';
      const anel = `<svg width="86" height="86" viewBox="0 0 86 86">
        <circle cx="43" cy="43" r="${R}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="8"/>
        <circle cx="43" cy="43" r="${R}" fill="none" stroke="${corAnel}" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="${C}" stroke-dashoffset="${C * (1 - pct / 100)}"
          transform="rotate(-90 43 43)" style="transition:stroke-dashoffset .6s ease;"/>
        <text x="43" y="49" text-anchor="middle" font-size="19" font-weight="700" fill="${corAnel}">${pct}%</text>
      </svg>`;

      // prioridades em aberto
      const cnt = { alta: 0, media: 0, baixa: 0 };
      pend.forEach(t => { const n = norm(t.prioridade); cnt[(n === 'alta' || n === 'baixa') ? n : 'media']++; });
      const prio = (lab, v, cor) => v ? `<span class="rp-prio" style="border-color:${cor};color:${cor};">${lab} ${v}</span>` : '';

      // setores do dia (pendentes)
      const porSetor = {};
      pend.forEach(t => { if (t.setor) porSetor[t.setor] = (porSetor[t.setor] || 0) + 1; });
      const setoresHtml = Object.entries(porSetor).sort((a, b) => b[1] - a[1]).slice(0, 6)
        .map(([s, v]) => `<span class="rp-setor">${chip(s)} <b>${v}</b></span>`).join('');

      // próximos prazos com selo de urgência
      const hojeS = fmtISO(estado.cursor ? new Date() : new Date());
      const amanha = new Date(); amanha.setDate(amanha.getDate() + 1);
      const amanhaS = fmtISO(amanha);
      const selo = p => {
        const s = String(p).slice(0, 10);
        if (s < hojeS) return ['ATRASADA', '#E06C6C'];
        if (s === hojeS) return ['HOJE', '#3FB07A'];
        if (s === amanhaS) return ['AMANHÃ', '#E3B341'];
        return [s.split('-').reverse().slice(0, 2).join('/'), '#8AAEC8'];
      };
      const proximos = (cacheProximos || []).slice(0, 5).map(t => {
        const [txt, cor] = selo(t.prazo);
        const cli = t.clientes?.nome_principal ? `<small>${esc(t.clientes.nome_principal)}</small>` : '';
        return `<div class="rp-prazo" data-rptask="${t.id}">
          <span class="rp-selo" style="background:${cor}1f;color:${cor};border-color:${cor}55;">${txt}</span>
          <span class="rp-ptit">${esc(t.titulo)}${cli}</span>
        </div>`;
      }).join('') || '<div style="color:#6E7787;font-size:12px;padding:4px 0;">Nada no radar.</div>';

      painel.innerHTML = `
        <div class="rp-topo">
          ${anel}
          <div class="rp-nums">
            <div class="rp-big">${feitasTudo}<span> de ${totalTudo}</span></div>
            <div class="rp-sub">${totalTudo - feitasTudo} em aberto${rotinasR.length ? ` · rotinas ${rotFeitas}/${rotinasR.length} ✓` : ''}</div>
            <div class="rp-prios">${prio('Alta', cnt.alta, '#E06C6C')}${prio('Média', cnt.media, '#E3B341')}${prio('Baixa', cnt.baixa, '#5B82A6')}</div>
          </div>
        </div>
        ${pct >= 100 && totalTudo > 0 ? '<div class="rp-festa">🎉 Dia zerado — bora pro café!</div>' : ''}
        ${setoresHtml ? `<div class="rp-secao">Setores do dia</div><div class="rp-setores">${setoresHtml}</div>` : ''}
        <div class="rp-secao">⏰ Próximos prazos</div>
        <div class="rp-prazos">${proximos}</div>`;
      painel.querySelectorAll('[data-rptask]').forEach(el =>
        el.addEventListener('click', () => abrirDetalhe(el.dataset.rptask)));
    }

    function atualizarPeriodo(){
      const el = document.getElementById('agPeriodo');
      if (estado.view==='dia') el.textContent = fmtDiaLongo(estado.cursor);
      else if (estado.view==='semana'){ const seg=segundaDaSemana(estado.cursor), dom=addDias(seg,6);
        el.textContent = `${seg.getDate()}/${seg.getMonth()+1} – ${dom.getDate()}/${dom.getMonth()+1}`; }
      else el.textContent = fmtMesAno(estado.cursor);
    }

    function chip(setor){ const i=SETOR_INFO[setor]||[setor||'—','#8A93A6','rgba(255,255,255,.06)']; return `<span class="setor-chip" style="color:${i[1]};background:${i[2]};border-color:${i[1]}55;">${i[0]}</span>`; }
    function dot(setor){ const i=SETOR_INFO[setor]||[setor,'#8A93A6']; return `<span class="setor-dot" style="background:${i[1]};"></span>`; }
    function esc(t){ return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function classePrio(p){ const n=norm(p); if(n==='alta')return 'prio-alta'; if(n==='baixa')return 'prio-baixa'; return 'prio-media'; }

    // ---------- DIA ----------
    function renderDia(){
      const d = estado.cursor;
      const tarefas = tarefasDoDia(d);
      const rotinas = rotinasDoDia(d);
      const pend = tarefas.filter(t => t.status!=='concluida').sort((a,b)=>{
        const pa=PRIO_ORDEM[norm(a.prioridade)] ?? 1, pb=PRIO_ORDEM[norm(b.prioridade)] ?? 1;
        if (pa!==pb) return pa-pb;
        return String(a.titulo||'').localeCompare(String(b.titulo||''));
      });
      const feitas = tarefas.filter(t => t.status==='concluida');

      let html = '';
      if (!tarefas.length && !rotinas.length){
        return envolverDia(`<div class="ag-vazio">Nada para ${mesmaData(d,hojeMeiaNoite())?'hoje':'este dia'} com os filtros atuais.</div>`);
      }

      html += `<div class="ag-dia-secao">Tarefas <span class="cont">${pend.length}</span></div>`;
      if (!pend.length) html += `<div class="ag-vazio" style="padding:18px;">Sem tarefas pendentes neste dia.</div>`;
      pend.forEach(t => {
        const cli = t.clientes?.nome_principal ? `<span>${esc(t.clientes.nome_principal)}</span><span class="sep">·</span>` : '';
        const resp = t.responsavel ? `<span>${esc(t.responsavel)}</span>` : '';
        html += `<div class="ag-card ${classePrio(t.prioridade)}" data-taskid="${t.id}">
          <div class="ag-card-main">
            <div class="ag-card-titulo">${esc(t.titulo)||'(sem título)'}</div>
            <div class="ag-card-meta">${chip(t.setor)} ${cli} ${resp}</div>
          </div>
          <select class="ag-prio" data-id="${t.id}">
            <option value="alta"${norm(t.prioridade)==='alta'?' selected':''}>Alta</option>
            <option value="media"${norm(t.prioridade)!=='alta'&&norm(t.prioridade)!=='baixa'?' selected':''}>Média</option>
            <option value="baixa"${norm(t.prioridade)==='baixa'?' selected':''}>Baixa</option>
          </select>
        </div>`;
      });

      if (rotinas.length){
        const feitasRot = rotinas.filter(r => rotinaFeita(r,d)).length;
        html += `<div class="ag-dia-secao">Rotinas do dia <span class="cont">${feitasRot}/${rotinas.length}</span></div>`;
        rotinas.forEach(r => {
          const feita = rotinaFeita(r, d);
          const resp = r.responsavel ? `<span>${esc(r.responsavel)}</span>` : '';
          const check = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
          html += `<div class="ag-card ag-rotina ${feita?'feita':''}">
            <button class="ag-rot-check ${feita?'on':''}" data-rotid="${r.id}" data-feita="${feita?1:0}" title="${feita?'Desfazer':'Marcar como feita'}" aria-label="${feita?'Desfazer rotina':'Concluir rotina'}">${feita?check:''}</button>
            <div class="ag-card-main">
              <div class="ag-card-titulo">${esc(rotuloRotina(r))}</div>
              <div class="ag-card-meta">${chip(r.setor)} ${resp}</div>
            </div>
          </div>`;
        });
      }

      if (feitas.length){
        html += `<div class="ag-dia-secao">Concluídas <span class="cont">${feitas.length}</span></div>`;
        feitas.forEach(t => {
          const quem = t.concluida_por ? `<span>por ${esc(nomePorEmail(t.concluida_por))}</span>` : '';
          html += `<div class="ag-card feita ${classePrio(t.prioridade)}" data-taskid="${t.id}">
            <div class="ag-card-main">
              <div class="ag-card-titulo">${esc(t.titulo)||'(sem título)'}</div>
              <div class="ag-card-meta">${chip(t.setor)} ${quem}</div>
            </div>
          </div>`;
        });
      }
      return envolverDia(html);
    }
    function envolverDia(left){
      return `<div class="ag-dia-layout">
        <div class="ag-dia-col">${left}</div>
        <aside class="ag-resumo-wrap">
          <div class="ag-dia-secao"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#8FC0F0;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Resumo do dia</div>
          <div class="ag-resumo" id="agResumo">
            <div id="resumoPainel"></div>
          </div>
        </aside>
      </div>`;
    }
    function nomePorEmail(e){ if(!e) return ''; const inv={'fiscal@macedoereis.com.br':'Thalia','rh@macedoereis.com.br':'Vitória','contabil@macedoereis.com.br':'Adaini','financeiro@macedoereis.com.br':'Samuel','diego@macedoereis.com.br':'Diego'}; return inv[String(e).toLowerCase()] || String(e).split('@')[0]; }

    // ---------- SEMANA ----------
    function renderSemana(){
      const seg = segundaDaSemana(estado.cursor);
      let html = '<div class="ag-semana">';
      for (let i=0;i<7;i++){
        const d = addDias(seg,i);
        const ts = tarefasDoDia(d), rs = rotinasDoDia(d);
        const ehHoje = ymd(d)===HOJE_STR;
        html += `<div class="ag-wk-col ${ehHoje?'hoje':''}" data-goto="${ymd(d)}">
          <div class="ag-wk-head">${DOW[i]}<span class="dnum">${d.getDate()}</span></div>`;
        ts.sort((a,b)=>(PRIO_ORDEM[norm(a.prioridade)]??1)-(PRIO_ORDEM[norm(b.prioridade)]??1));
        ts.forEach(t => {
          html += `<div class="ag-wk-item ${classePrio(t.prioridade)} ${t.status==='concluida'?'feita':''}">${dot(t.setor)}<span class="t">${esc(t.titulo)||'—'}</span></div>`;
        });
        rs.forEach(r => {
          html += `<div class="ag-wk-item"><span class="setor-dot" style="background:#8A93A6;"></span><span class="t">↻ ${esc(rotuloRotina(r))}</span></div>`;
        });
        html += `</div>`;
      }
      return html + '</div>';
    }

    // ---------- MÊS ----------
    function renderMes(){
      const d = estado.cursor;
      const primeiro = new Date(d.getFullYear(), d.getMonth(), 1);
      const inicioGrade = segundaDaSemana(primeiro);
      let html = '<div class="ag-mes">';
      DOW.forEach(n => html += `<div class="ag-mes-dow">${n}</div>`);
      for (let i=0;i<42;i++){
        const cur = addDias(inicioGrade, i);
        const fora = cur.getMonth() !== d.getMonth();
        const ehHoje = ymd(cur)===HOJE_STR;
        const ts = tarefasDoDia(cur), rs = rotinasDoDia(cur);
        const itens = [];
        ts.sort((a,b)=>(PRIO_ORDEM[norm(a.prioridade)]??1)-(PRIO_ORDEM[norm(b.prioridade)]??1));
        ts.forEach(t => itens.push({txt:t.titulo||'—', setor:t.setor, feita:t.status==='concluida'}));
        rs.forEach(r => itens.push({txt:'↻ '+rotuloRotina(r), setor:r.setor, feita:false}));
        let chips = itens.slice(0,3).map(it => `<div class="ag-mo-chip ${it.feita?'feita':''}">${dot(it.setor)} ${esc(it.txt)}</div>`).join('');
        if (itens.length>3) chips += `<div class="ag-mo-mais">+${itens.length-3} mais</div>`;
        html += `<div class="ag-mo-cell ${fora?'fora':''} ${ehHoje?'hoje':''}" data-goto="${ymd(cur)}">
          <div class="ag-mo-day">${cur.getDate()}</div>${chips}</div>`;
        if (i>=34 && cur.getMonth()!==d.getMonth() && diaSemanaISO(cur)===7) break;
      }
      return html + '</div>';
    }

    // ---- interações pós-render ----
    function ligarInteracoes(){
      // mudar prioridade (visão dia)
      document.querySelectorAll('.ag-prio').forEach(sel => {
        sel.addEventListener('change', async (e) => {
          const id = e.target.dataset.id, novo = e.target.value;
          e.target.disabled = true;
          const { error } = await supabase.from('tarefas').update({ prioridade: novo }).eq('id', id);
          e.target.disabled = false;
          if (error){ alert('Erro ao mudar prioridade: '+error.message); return; }
          const t = cacheTarefas.find(x => String(x.id)===String(id)); if (t) t.prioridade = novo;
          render();
        });
      });
      // clicar num dia (semana/mês) -> visão dia
      document.querySelectorAll('[data-goto]').forEach(cel => {
        cel.addEventListener('click', (e) => {
          if (e.target.closest('.ag-prio')) return;
          const [y,m,dd] = cel.dataset.goto.split('-').map(Number);
          estado.cursor = new Date(y, m-1, dd); estado.view = 'dia';
          document.querySelectorAll('.ag-view-btn').forEach(b => b.classList.toggle('is-active', b.dataset.view==='dia'));
          recarregarERenderizar();
        });
      });
      // clicar numa tarefa (visão dia) -> abre o modal de edição
      document.querySelectorAll('.ag-card[data-taskid]').forEach(card => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.ag-prio')) return;  // mexer na prioridade não abre o modal
          abrirDetalhe(card.dataset.taskid);
        });
      });
      // concluir / desfazer rotina do dia
      document.querySelectorAll('.ag-rot-check').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = btn.dataset.rotid;
          const estaFeita = btn.dataset.feita === '1';
          btn.disabled = true;
          const novoValor = estaFeita ? null : ymd(estado.cursor);
          const { error } = await supabase.from('rotinas').update({ ultima_execucao: novoValor }).eq('id', id);
          btn.disabled = false;
          if (error){ alert('Erro ao atualizar rotina: ' + error.message); return; }
          const r = cacheRotinas.find(x => String(x.id) === String(id)); if (r) r.ultima_execucao = novoValor;
          render();
        });
      });
    }

    // ===================== MODAL DE DETALHE DA TAREFA =====================
    const STATUS_LBL = { pendente:'Pendente', em_andamento:'Em andamento', concluida:'Concluído' };
    function fmtDataHora(iso){ try { return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; } }
    function escHtml(t){ return String(t==null?'':t).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    const detOverlay = document.getElementById('detOverlay');

    document.getElementById('detClose').addEventListener('click', fecharDetalhe);
    detOverlay.addEventListener('click', e => { if (e.target === detOverlay) fecharDetalhe(); });
    document.getElementById('dAddAnd').addEventListener('click', addAndamento);
    document.getElementById('dSalvar').addEventListener('click', salvarDetalhe);
    document.getElementById('dBtnConcluir').addEventListener('click', concluirTarefa);
    document.getElementById('dBtnReabrir').addEventListener('click', reabrirTarefa);
    document.getElementById('dExcluir').addEventListener('click', excluirTarefa);

    function fecharDetalhe(){ detOverlay.classList.remove('is-open'); procAtual = null; document.getElementById('dNovoAnd').value = ''; }

    async function abrirDetalhe(id){
      const t = cacheTarefas.find(x => String(x.id) === String(id)) || cacheSemPrazo.find(x => String(x.id) === String(id)) || cacheBusca.find(x => String(x.id) === String(id));
      if (!t) return;
      procAtual = t;
      const concl = t.status === 'concluida';
      document.getElementById('dTipo').textContent = t.titulo || 'Tarefa';
      document.getElementById('dEmpresa').textContent = t.clientes?.nome_principal || 'Interno (sem empresa)';
      document.getElementById('dResp').value = t.responsavel || '';
      document.getElementById('dPrazo').value = t.prazo ? String(t.prazo).slice(0,10) : '';
      document.getElementById('dPrioridade').value = (norm(t.prioridade)==='alta'||norm(t.prioridade)==='baixa') ? norm(t.prioridade) : 'media';
      document.getElementById('dStatus').value = concl ? 'em_andamento' : (t.status || 'pendente');
      document.getElementById('dDescricao').value = t.descricao || '';
      const banner = document.getElementById('dConcBanner');
      banner.style.display = concl ? 'block' : 'none';
      if (concl) banner.textContent = 'Concluído em ' + fmtDataHora(t.concluida_em) + (t.concluida_por ? ' por ' + nomePorEmail(t.concluida_por) : '');
      document.getElementById('dStatusWrap').style.display = concl ? 'none' : 'flex';
      document.getElementById('dBtnConcluir').style.display = concl ? 'none' : 'inline-flex';
      document.getElementById('dBtnReabrir').style.display = concl ? 'inline-flex' : 'none';
      detOverlay.classList.add('is-open');
      await renderTimeline(id);
    }

    async function renderTimeline(id){
      const tl = document.getElementById('dTimeline');
      tl.innerHTML = '<div class="tl-empty">Carregando…</div>';
      const { data } = await supabase.from('tarefa_historico').select('*').eq('tarefa_id', id).order('created_at', { ascending: false });
      if (!data || !data.length){ tl.innerHTML = '<div class="tl-empty">Nenhum andamento ainda.</div>'; return; }
      tl.innerHTML = data.map(h => `<div class="tl-item"><div class="tl-when">${fmtDataHora(h.created_at)}</div><div class="tl-desc">${escHtml(h.descricao)}</div>${h.autor ? `<div class="tl-autor">${escHtml(nomePorEmail(h.autor))}</div>` : ''}</div>`).join('');
    }

    async function addAndamento(){
      if (!procAtual) return;
      const inp = document.getElementById('dNovoAnd');
      const txt = inp.value.trim();
      if (!txt){ alert('Escreva o andamento.'); return; }
      const btn = document.getElementById('dAddAnd'); btn.disabled = true; btn.textContent = 'Salvando…';
      const { error } = await supabase.from('tarefa_historico').insert({ tarefa_id: procAtual.id, descricao: txt, autor: usuarioEmail });
      btn.disabled = false; btn.textContent = 'Adicionar andamento';
      if (error){ alert('Erro: ' + error.message); return; }
      inp.value = '';
      await renderTimeline(procAtual.id);
    }

    async function salvarDetalhe(){
      if (!procAtual) return;
      const concl = procAtual.status === 'concluida';
      const novoStatus = document.getElementById('dStatus').value;
      const patch = {
        responsavel: document.getElementById('dResp').value.trim() || null,
        prazo: document.getElementById('dPrazo').value || null,
        prioridade: document.getElementById('dPrioridade').value,
        descricao: document.getElementById('dDescricao').value.trim() || null,
      };
      if (!concl) patch.status = novoStatus;
      const statusMudou = !concl && procAtual.status !== novoStatus;
      const btn = document.getElementById('dSalvar'); btn.disabled = true;
      const { error } = await supabase.from('tarefas').update(patch).eq('id', procAtual.id);
      btn.disabled = false;
      if (error){ alert('Erro ao salvar: ' + error.message); return; }
      if (statusMudou) await supabase.from('tarefa_historico').insert({ tarefa_id: procAtual.id, descricao: 'Status alterado para: ' + STATUS_LBL[novoStatus] + '.', autor: usuarioEmail });
      fecharDetalhe();
      await recarregarERenderizar();
    }

    async function concluirTarefa(){
      if (!procAtual) return;
      if (!confirm('Concluir esta tarefa?')) return;
      const { error } = await supabase.from('tarefas').update({ status:'concluida', concluida_em:new Date().toISOString(), concluida_por:usuarioEmail }).eq('id', procAtual.id);
      if (error){ alert('Erro: '+error.message); return; }
      await supabase.from('tarefa_historico').insert({ tarefa_id:procAtual.id, descricao:'Tarefa concluída.', autor:usuarioEmail });
      fecharDetalhe();
      await recarregarERenderizar();
    }

    async function reabrirTarefa(){
      if (!procAtual) return;
      const { error } = await supabase.from('tarefas').update({ status:'em_andamento', concluida_em:null, concluida_por:null }).eq('id', procAtual.id);
      if (error){ alert('Erro: '+error.message); return; }
      await supabase.from('tarefa_historico').insert({ tarefa_id:procAtual.id, descricao:'Tarefa reaberta.', autor:usuarioEmail });
      fecharDetalhe();
      await recarregarERenderizar();
    }

    async function excluirTarefa(){
      if (!procAtual) return;
      if (!confirm('Excluir esta tarefa e toda a sua linha do tempo? Esta ação não pode ser desfeita.')) return;
      const { error } = await supabase.from('tarefas').delete().eq('id', procAtual.id);
      if (error){ alert('Erro: '+error.message); return; }
      fecharDetalhe();
      await recarregarERenderizar();
    }

    // ---- range conforme a visão ----
    function rangeAtual(){
      if (estado.view==='dia') return [estado.cursor, estado.cursor];
      if (estado.view==='semana'){ const seg=segundaDaSemana(estado.cursor); return [seg, addDias(seg,6)]; }
      const primeiro=new Date(estado.cursor.getFullYear(),estado.cursor.getMonth(),1);
      const ini=segundaDaSemana(primeiro); return [ini, addDias(ini,41)];
    }
    async function recarregarERenderizar(){
      const c = document.getElementById('agConteudo');
      c.innerHTML = '<div class="ag-vazio"><span class="spinner"></span> Carregando…</div>';
      const [ini,fim] = rangeAtual();
      await carregarDados(ini, fim);
      if (estado.view==='dia') await carregarProximos();
      render();
    }

    // ---- navegação ----
    function passo(dir){
      if (estado.view==='dia') estado.cursor = addDias(estado.cursor, dir);
      else if (estado.view==='semana') estado.cursor = addDias(estado.cursor, dir*7);
      else estado.cursor = new Date(estado.cursor.getFullYear(), estado.cursor.getMonth()+dir, 1);
      recarregarERenderizar();
    }
    document.getElementById('agPrev').addEventListener('click', ()=>passo(-1));
    document.getElementById('agNext').addEventListener('click', ()=>passo(1));
    document.getElementById('agHoje').addEventListener('click', ()=>{ estado.cursor = hojeMeiaNoite(); recarregarERenderizar(); });
    document.querySelectorAll('.ag-view-btn').forEach(b => b.addEventListener('click', ()=>{
      estado.view = b.dataset.view;
      document.querySelectorAll('.ag-view-btn').forEach(x => x.classList.toggle('is-active', x===b));
      recarregarERenderizar();
    }));
    document.getElementById('fSetor').addEventListener('change', e => { estado.setor = e.target.value; render(); });
    document.getElementById('fResp').addEventListener('change', e => { estado.resp = e.target.value; render(); });

    // ---- popular filtros ----
    function popularFiltros(){
      const fs = document.getElementById('fSetor');
      SETORES_LISTA.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=(SETOR_INFO[s]||[s])[0]; fs.appendChild(o); });
      const fr = document.getElementById('fResp');
      EQUIPE.forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; fr.appendChild(o); });
    }

    // ---- init ----
    (async () => {
      const user = await getCurrentUser();
      usuarioEmail = user?.email || null;
      if (user){
        const nome = FILTRO_PESSOAL[(user.email||'').toLowerCase()] || user.email?.split('@')[0] || 'Usuário';
        document.getElementById('userName').textContent = nome;
        document.getElementById('userAvatar').textContent = nome.charAt(0).toUpperCase();
      }
      popularFiltros();
      // filtro padrão: cada um vê o seu; sócios veem tudo
      const email = (user?.email||'').toLowerCase();
      if (!SOCIOS.includes(email) && FILTRO_PESSOAL[email]){
        estado.resp = FILTRO_PESSOAL[email];
        document.getElementById('fResp').value = estado.resp;
      }
      await recarregarERenderizar();
    })();
    document.getElementById('btnLogout').addEventListener('click', signOut);
      // ---------- tarefa rápida ----------
    const avOverlay = document.getElementById('avOverlay');
    let avCli = null, avTimer = null;
    document.getElementById('avResp').innerHTML += EQUIPE.map(p => `<option>${p}</option>`).join('');
    document.getElementById('btnNovaAv').addEventListener('click', () => {
      avCli = null;
      ['avTitulo', 'avDesc', 'avCliBusca'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('avSetor').value = 'geral';
      document.getElementById('avResp').value = '';
      document.getElementById('avPrazo').value = new Date().toISOString().slice(0, 10);
      document.getElementById('avCliChip').style.display = 'none';
      document.getElementById('avCliRes').style.display = 'none';
      avOverlay.classList.add('is-open');
      document.getElementById('avTitulo').focus();
    });
    const avFechar = () => avOverlay.classList.remove('is-open');
    document.getElementById('avClose').addEventListener('click', avFechar);
    document.getElementById('avCancelar').addEventListener('click', avFechar);
    avOverlay.addEventListener('click', e => { if (e.target === avOverlay) avFechar(); });

    document.getElementById('avCliBusca').addEventListener('input', () => {
      clearTimeout(avTimer);
      avTimer = setTimeout(async () => {
        const t = document.getElementById('avCliBusca').value.trim();
        const el = document.getElementById('avCliRes');
        if (t.length < 3) { el.style.display = 'none'; return; }
        const { data } = await supabase.from('clientes')
          .select('id, nome_principal, nome_fantasia, cidade')
          .or(`nome_principal.ilike.*${t}*,nome_fantasia.ilike.*${t}*`).limit(8);
        el.innerHTML = (data || []).map(c => `<button data-id="${c.id}" data-nome="${(c.nome_principal || '').replace(/"/g, '&quot;')}">${c.nome_principal}<small>${[c.nome_fantasia, c.cidade].filter(Boolean).join(' · ') || '&nbsp;'}</small></button>`).join('')
          || '<button disabled style="color:#6E7787;cursor:default;">Nada encontrado.</button>';
        el.style.display = 'block';
        el.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => {
          avCli = { id: b.dataset.id, nome: b.dataset.nome };
          document.getElementById('avCliNome').textContent = avCli.nome;
          document.getElementById('avCliChip').style.display = 'block';
          document.getElementById('avCliBusca').value = '';
          el.style.display = 'none';
        }));
      }, 300);
    });
    document.getElementById('avCliTira').addEventListener('click', e => {
      e.preventDefault(); avCli = null;
      document.getElementById('avCliChip').style.display = 'none';
    });

    document.getElementById('avSalvar').addEventListener('click', async () => {
      const titulo = document.getElementById('avTitulo').value.trim();
      if (!titulo) { alert('Dá um nome pra tarefa, pelo menos isso kkk'); return; }
      const btn = document.getElementById('avSalvar');
      btn.disabled = true;
      try {
        const payload = {
          titulo,
          setor: document.getElementById('avSetor').value,
          tipo: 'tarefa',
          descricao: document.getElementById('avDesc').value.trim() || null,
          responsavel: document.getElementById('avResp').value || null,
          prazo: document.getElementById('avPrazo').value || null,
          prioridade: document.getElementById('avPri').value,
          status: 'pendente',
          origem: 'avulsa',
          cliente_id: avCli ? avCli.id : null
        };
        const { data: ins, error } = await supabase.from('tarefas').insert(payload).select('id').single();
        if (error) { alert('Erro ao criar (' + (error.code || '?') + '): ' + error.message); return; }
        if (ins) {
          const { data: au } = await supabase.auth.getUser();
          await supabase.from('tarefa_historico').insert({
            tarefa_id: ins.id, descricao: 'Tarefa criada pela Agenda.', autor: au?.user?.email || null
          });
        }
        avFechar();
        location.reload();
      } catch (e) {
        alert('Falha inesperada: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    });
      // ---------- filtros que lembram de você ----------
    {
      const auF = await supabase.auth.getUser();
      const emailF = auF?.data?.user?.email || '';
      const chaveF = 'ag_filtros::' + emailF;
      const normF = s => String(s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      const selS = document.getElementById('fSetor');
      const selR = document.getElementById('fResp');
      const salvarF = () => localStorage.setItem(chaveF, JSON.stringify({ setor: selS.value, resp: selR.value }));
      selS.addEventListener('change', salvarF);
      selR.addEventListener('change', salvarF);
      let alvoS = '', alvoR = '';
      const salvo = localStorage.getItem(chaveF);
      if (salvo) {
        try { const s = JSON.parse(salvo); alvoS = s.setor || ''; alvoR = s.resp || ''; } catch {}
      } else {
        const local = normF(emailF.split('@')[0]);
        const mapa = { financeiro: 'Samuel' };
        alvoR = mapa[local] || EQUIPE.find(p => normF(p) === local || normF(p).startsWith(local)) || '';
      }
      const aplica = (sel, v) => {
        if (v && [...sel.options].some(o => o.value === v) && sel.value !== v) {
          sel.value = v;
          sel.dispatchEvent(new Event('change'));
        }
      };
      aplica(selS, alvoS);
      aplica(selR, alvoR);
    }

    // ---------- tour de estreia (espera a tela nascer) ----------
    if (window.MRTour) {
      const espera = s => new Promise(res => {
        const t0 = Date.now();
        const t = setInterval(() => {
          if (document.querySelector(s) || Date.now() - t0 > 4000) { clearInterval(t); res(); }
        }, 200);
      });
      await espera('.ag-dia-col');
      const au2 = await supabase.auth.getUser();
      MRTour.iniciar([
        { el: '.ag-views', titulo: 'Sua semana num olhar', texto: 'Dia, Semana ou Mês — as setas navegam no tempo e o Hoje te traz de volta pro agora.' },
        { el: '#fSetor', titulo: 'Filtros', texto: 'Enxergue só um setor ou só um responsável — foco individual ou visão de reunião.' },
        { el: '#btnNovaAv', titulo: 'Tarefa rápida ★', texto: 'Novidade: crie avulsos direto daqui — juntar documentação, pendência pontual. Só o título é obrigatório; setor Geral, cliente, prazo e responsável são à la carte.' },
        { el: '.ag-dia-col', titulo: 'As tarefas do período', texto: 'Clique em qualquer cartão pra abrir o detalhe: andamento, histórico, concluir. As sem prazo moram no bloco próprio, no topo.' },
        { el: '#agResumo', titulo: 'Resumo do dia', texto: 'O termômetro: concluídas, em aberto e o percentual do dia vencido.' }
      ], 'agenda_v1', new URLSearchParams(location.search).has('tour'), au2?.data?.user?.email || '');
    }
  </script>
